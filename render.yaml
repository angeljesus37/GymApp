services:
  - type: web
    name: app-entrenamiento
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: BOOTSTRAP_FROM_JSON
        value: "true"
      - key: SESSION_COOKIE_SECURE
        value: "true"